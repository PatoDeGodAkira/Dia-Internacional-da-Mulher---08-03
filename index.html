<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homenagem Infinita - 8 de Março</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

:root {
--gradient: linear-gradient(135deg,#ff9a9e 0%,#fad0c4 100%);
--female-gradient: linear-gradient(135deg,#ff6fa5 0%,#ff9a9e 100%);
--glass: rgba(255, 255, 255, 0.25);
--text-shadow: 2px 2px 6px rgba(0,0,0,0.2);
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(180deg,#fff0f5,#ffe4ec);
color:#2d3436;
overflow-x:hidden;
}

/* HERO */

.hero{
height:70vh;
background:
linear-gradient(rgba(190,0,57,0.5),rgba(103,11,139,0.5)),
url('https://media.istockphoto.com/id/2193289409/pt/vetorial/international-womens-day-2025-background.jpg?s=612x612&w=0&k=20&c=SU9VChR84hzcswCP3-RLHfvUlf5nKFVLVi4gmz4663o=');
background-size: cover;
background-repeat: no-repeat;
background-position: center;
background-attachment: fixed;

animation: heroWaves 12s ease-in-out infinite;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
clip-path:polygon(0 0,100% 0,100% 85%,0 100%);
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:clamp(2.5rem,8vw,5rem);
margin:0;
letter-spacing:2px;
}

.hero p{
font-family:'Dancing Script',cursive;
font-size:clamp(1.5rem,4vw,2.5rem);
margin-top:10px;
color:#ffd1dc;
}

@keyframes heroWaves{
0%{background-position:50% 50%;}
25%{background-position:52% 48%;}
50%{background-position:50% 52%;}
75%{background-position:48% 50%;}
100%{background-position:50% 50%;}
}

.main-content{
max-width:1000px;
margin:-100px auto 50px;
padding:0 20px;
position:relative;
z-index:2;
}

.search-box{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
padding:50px;
border-radius:30px;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
text-align:center;
}

.search-box h2{
font-weight:300;
color:#657263;
margin-bottom:30px;
}

.input-wrapper{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

input{
padding:18px 30px;
border:2px solid #ffd1dc;
border-radius:50px;
width:100%;
max-width:400px;
font-size:1.1rem;
transition:0.3s;
outline:none;
}

input:focus{
border-color:#ff6fa5;
box-shadow:0 0 15px rgba(255,105,180,0.2);
}

.btn-celebrate{
background:var(--female-gradient);
color:white;
border:none;
padding:18px 40px;
border-radius:50px;
font-weight:600;
text-transform:uppercase;
letter-spacing:1px;
cursor:pointer;
transition:0.4s;
box-shadow:0 10px 20px rgba(255,105,180,0.35);
}

#result-area{
display:none;
margin-top:50px;
animation:fadeInUp 0.8s ease;
}

/* envelope */

.envelope{
width:220px;
height:140px;
background:#ff9a9e;
margin:40px auto;
position:relative;
cursor:pointer;
border-radius:6px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.envelope::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff6fa5;
clip-path:polygon(0 0,50% 60%,100% 0);
transition:0.6s;
}

.envelope.open::before{
transform:rotateX(180deg);
transform-origin:top;
}

.envelope-text{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:600;
}

.card-canvas{
display:none;
background:linear-gradient(180deg,#ffffff,#fff6f9);
padding:80px 60px;
border-radius:40px;
position:relative;
overflow:hidden;
box-shadow:0 30px 60px rgba(255,105,180,0.18);
border:1px solid rgba(255,182,193,0.35);
}

.card-title{
font-family:'Playfair Display',serif;
font-size:3.5rem;
color:#e84393;
margin-bottom:30px;
font-style:italic;
}

.card-text{
font-size:1.8rem;
line-height:1.8;
color:#444;
font-weight:300;
}

.download-zone{
margin:40px 0;
text-align:center;
}

.btn-dl{
background:#e84393;
color:white;
padding:15px 30px;
border-radius:12px;
border:none;
cursor:pointer;
font-size:1rem;
}

footer{
padding:50px;
text-align:center;
color:#b2bec3;
}

/* RESPONSIVIDADE PARA CELULAR (ADICIONADO) */

@media (max-width:768px){

.hero h1{
font-size:clamp(2rem,9vw,3rem);
}

.hero p{
font-size:clamp(1.2rem,5vw,1.8rem);
}

.search-box{
padding:30px 20px;
}

input{
font-size:1rem;
padding:15px 20px;
}

.btn-celebrate{
padding:15px 25px;
font-size:0.9rem;
}

.card-canvas{
padding:40px 25px;
}

.card-title{
font-size:2rem;
}

.card-text{
font-size:1.3rem;
line-height:1.7;
}

.btn-dl{
font-size:0.9rem;
padding:12px 20px;
}

.envelope{
width:180px;
height:120px;
}

}

</style>
</head>

<body>

<section class="hero">
<h1>Oito de Março</h1>
<p>A força que move o mundo tem nome: Mulher.</p>
</section>

<div class="main-content">

<div class="search-box">
<h2>Homenagem Personalizada</h2>

<div class="input-wrapper">
<input type="text" id="targetName" placeholder="Quem você quer emocionar hoje?" onkeypress="if(event.key==='Enter') startCelebration()">
<button class="btn-celebrate" onclick="startCelebration()">Celebrar ✨</button>
</div>

</div>

<div id="result-area">

<div class="envelope" id="envelope" onclick="openEnvelope()">
<div class="envelope-text">💌 Abrir carta</div>
</div>

<div class="card-canvas" id="final-card">
<div id="msg-content"></div>


<div style="margin-top:40px;color:#ff4b2b;font-size:1.5rem;">∞</div>
</div>

<div class="download-zone">
<button class="btn-dl" onclick="saveAsImage()">📸 Salvar Homenagem como Imagem</button>
</div>

</div>

</div>

<footer>
&copy; 2026 | Uma celebração à vida e à força feminina.
</footer>

<script>

let currentMessage="";

const cardColors=[
"linear-gradient(180deg,#ffffff,#fff6f9)",
"linear-gradient(180deg,#ffe4ec,#ffffff)",
"linear-gradient(180deg,#fff0f5,#ffe4ec)",
"linear-gradient(180deg,#fce4ff,#ffffff)",
"linear-gradient(180deg,#ffe0f0,#fff)",
"linear-gradient(180deg,#ffd6e8,#ffffff)",
"linear-gradient(180deg,#f8e8ff,#ffffff)"
];

function typeWriterEffect(element,text,speed=35){
let i=0;
element.innerHTML="";
function typing(){
if(i<text.length){
element.innerHTML+=text.charAt(i)==="\n"?"<br>":text.charAt(i);
i++;
setTimeout(typing,speed);
}
}
typing();
}

function openEnvelope(){
document.getElementById("envelope").classList.add("open");
setTimeout(()=>{
document.getElementById("envelope").style.display="none";
document.getElementById("final-card").style.display="block";
},600)
}


function startCelebration(){

const rawName=document.getElementById('targetName').value.trim();
if(!rawName)return;

const name=rawName.toLowerCase();
const container=document.getElementById('msg-content');

let t="";
let m="";

if(name==="maria"){
t="Para a Minha Vovó Maria";
m="Vovó, você é o capítulo mais bonito da nossa história. Uma mulher cuja força foi forjada no trabalho e cuja doçura foi temperada pelo tempo. \n\nVocê é guerreira, é porto seguro e é a prova viva de que o amor pode sustentar gerações. Feliz seu dia, rainha da nossa família!";
}

else if(name.includes("andreia")||name.includes("andréia")){
t="Para a Minha Tia Andreia";
m="Tia, você é a dose de alegria que todo mundo precisa! Divertida, autêntica e 'bem louca' no jeito mais maravilhoso possível. \n\nObrigado por nos ensinar que ser mulher também é ser livre, leve e dar risada dos problemas. Você é única e merece um brinde especial hoje!";
}

else if(name==="cris"||name==="cristiane"){
t="Para a Minha Tia Cris";
m="Tia Cris, sua presença é sinônimo de acolhimento. Você é uma mulher fantástica, de uma elegância de alma que inspira a todos nós. \n\nNeste 8 de março, celebro sua vida e a pessoa maravilhosa que você é. Que seu brilho nunca se apague!";
}

else if(name==="daiana"){
t="Para Daiana";
m="Daiana, você possui uma luz que é só sua. Hoje é o dia de reconhecer a mulher incrível que você se tornou: decidida, cheia de sonhos e com um coração que não cabe no peito. \n\nQue o mundo seja pequeno para as suas conquistas!";
}

else if(name==="Penha" || name==="penha"){
t="Para Penha";
m="Vó Penha, você é como uma flor rara que o tempo só fez florescer ainda mais bonita. Sua vida é um jardim de histórias, cuidado e amor que perfuma todos ao seu redor. \n\nCom sua força e delicadeza, você ensinou que as flores mais bonitas são aquelas cultivadas com paciência, carinho e coragem. Feliz seu dia, rainha do nosso jardim e inspiração da nossa família!";}

else if(name==="gisele"){
t="Homenagem à Gisele";
m="Gisele, olhar para sua trajetória é ver a definição de coragem. Uma mulher batalhadora, que enfrenta os leões do dia a dia com a garra de quem sabe o que quer. \n\nSua dedicação como mãe é comovente e exemplar. Você é uma verdadeira fortaleza!";
}

else if(name==="suh"){
t="Para a Suh";
m="Suh, parabéns pela mulher admirável que você é. Sua doçura não esconde a mãe leoa e a profissional dedicada que todos respeitam. \n\nQue este dia te traga todo o reconhecimento que você merece por lutar e amar com tanta intensidade!";
}

else if(name==="elaine"){
t="PARA MINHA MÃE ELAINE: MEU TUDO!";
m="Mãe, faltam palavras para descrever a imensidão do que você representa. Além de ser a melhor mãe do mundo, você é minha melhor amiga e a inspiração que me faz querer ser alguém melhor todos os dias. \n\nVocê é incrível, resiliente e o ser humano mais especial que eu conheço. Obrigado por ser minha guia. Eu te amo além do infinito!";
}

else{

const variations=[
`Feliz Dia da Mulher, ${rawName}!`,
`${rawName}, celebre hoje a mulher maravilhosa que você é!`,
`Para ${rawName}: O mundo fica mais bonito com sua presença.`
];

t=`Feliz seu Dia, ${rawName}`;
m=variations[Math.floor(Math.random()*variations.length)];

}

currentMessage=m;

const randomColor=cardColors[Math.floor(Math.random()*cardColors.length)];
document.getElementById("final-card").style.background=randomColor;

container.innerHTML=`<div class="card-title">${t}</div><div class="card-text" id="typedMessage"></div>`;

typeWriterEffect(document.getElementById("typedMessage"),m);

document.getElementById('result-area').style.display='block';

}

function saveAsImage(){

const card=document.getElementById('final-card');

html2canvas(card,{scale:3}).then(canvas=>{
const link=document.createElement('a');
link.download=`homenagem-${new Date().getTime()}.png`;
link.href=canvas.toDataURL();
link.click();
});

}

</script>

</body>
</html>
